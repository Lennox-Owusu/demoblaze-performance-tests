name: DemoBlaze Performance Tests

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select which test to run'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - load
          - stress
          - endurance

env:
  JMETER_VERSION: 5.6.3
  JMETER_HOME: ${{ github.workspace }}/apache-jmeter-5.6.3
  JMX_FILE: DemoBlaze_Complete_TestPlan_v2.jmx
  RESULTS_DIR: ${{ github.workspace }}/results
  REPORTS_DIR: ${{ github.workspace }}/html-reports

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: BASELINE TEST
  # ─────────────────────────────────────────────────────────────
  baseline-test:
    name: "Baseline Test (50 Users)"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'baseline') ||
      github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache JMeter installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download & Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz

      - name: Create results directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}/baseline

      - name: Run Baseline Test (50 users)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t ${{ github.workspace }}/${{ env.JMX_FILE }} \
            -l ${{ env.RESULTS_DIR }}/baseline.jtl \
            -e -o ${{ env.REPORTS_DIR }}/baseline \
            -Jthreads=50 \
            -Jrampup=50 \
            -Jloops=3
        continue-on-error: true

      - name: Check Performance Thresholds
        id: baseline-thresholds
        run: |
          python3 << 'EOF'
          import csv, sys, os

          jtl_file = "${{ env.RESULTS_DIR }}/baseline.jtl"
          EXCLUDED_SAMPLER = "07 - Checkout (Place Order)"

          error_count = 0
          total_count = 0
          total_elapsed = 0
          elapsed_values = []
          violations = []

          with open(jtl_file, newline='') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  label = row.get('label', '')
                  if EXCLUDED_SAMPLER in label:
                      continue
                  total_count += 1
                  elapsed = int(row.get('elapsed', 0))
                  total_elapsed += elapsed
                  elapsed_values.append(elapsed)
                  if row.get('success', 'true').lower() != 'true':
                      error_count += 1

          if total_count == 0:
              print("ERROR: No results found in JTL file!")
              sys.exit(1)

          elapsed_values.sort()
          avg_response = total_elapsed / total_count
          error_rate = (error_count / total_count) * 100
          p90 = elapsed_values[max(int(total_count * 0.90) - 1, 0)]
          p95 = elapsed_values[max(int(total_count * 0.95) - 1, 0)]
          p99 = elapsed_values[max(int(total_count * 0.99) - 1, 0)]
          min_resp = elapsed_values[0]
          max_resp = elapsed_values[-1]

          print(f"Total Requests  : {total_count} (excl. Checkout)")
          print(f"Avg Response    : {avg_response:.0f}ms")
          print(f"Error Rate      : {error_rate:.2f}%")
          print(f"P90 / P95 / P99 : {p90}ms / {p95}ms / {p99}ms")
          print(f"Min / Max       : {min_resp}ms / {max_resp}ms")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              print(f"avg_response={avg_response:.0f}", file=fh)
              print(f"error_rate={error_rate:.2f}", file=fh)
              print(f"total_requests={total_count}", file=fh)
              print(f"p90={p90}", file=fh)
              print(f"p95={p95}", file=fh)
              print(f"p99={p99}", file=fh)
              print(f"min_response={min_resp}", file=fh)
              print(f"max_response={max_resp}", file=fh)
              print(f"error_count={error_count}", file=fh)

          if avg_response > 2000:
              violations.append(f"Avg response {avg_response:.0f}ms exceeds 2000ms threshold")
          if error_rate > 1.0:
              violations.append(f"Error rate {error_rate:.2f}% exceeds 1% threshold")

          if violations:
              print("\n=== PERFORMANCE GATE FAILURES ===")
              for v in violations:
                  print(v)
              sys.exit(1)
          else:
              print("\n=== ALL PERFORMANCE GATES PASSED ===")
          EOF

      - name: Upload Baseline HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-html-report
          path: ${{ env.REPORTS_DIR }}/baseline
          retention-days: 30

      - name: Upload Baseline JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-jtl-results
          path: ${{ env.RESULTS_DIR }}/baseline.jtl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 2: LOAD TEST
  # ─────────────────────────────────────────────────────────────
  load-test:
    name: "Load Test (150 Users)"
    runs-on: ubuntu-latest
    needs: baseline-test
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'load')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache JMeter installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download & Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz

      - name: Create results directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}/load

      - name: Run Load Test (150 users)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t ${{ github.workspace }}/${{ env.JMX_FILE }} \
            -l ${{ env.RESULTS_DIR }}/load.jtl \
            -e -o ${{ env.REPORTS_DIR }}/load \
            -Jthreads=150 \
            -Jrampup=120 \
            -Jloops=2
        continue-on-error: true

      - name: Check Performance Thresholds
        id: load-thresholds
        run: |
          python3 << 'EOF'
          import csv, sys, os

          jtl_file = "${{ env.RESULTS_DIR }}/load.jtl"
          error_count = 0
          total_count = 0
          total_elapsed = 0
          elapsed_values = []

          with open(jtl_file, newline='') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  total_count += 1
                  elapsed = int(row.get('elapsed', 0))
                  total_elapsed += elapsed
                  elapsed_values.append(elapsed)
                  if row.get('success', 'true').lower() != 'true':
                      error_count += 1

          if total_count == 0:
              print("ERROR: No results found in JTL file!")
              sys.exit(1)

          elapsed_values.sort()
          avg_response = total_elapsed / total_count
          error_rate = (error_count / total_count) * 100
          p90 = elapsed_values[max(int(total_count * 0.90) - 1, 0)]
          p95 = elapsed_values[max(int(total_count * 0.95) - 1, 0)]
          p99 = elapsed_values[max(int(total_count * 0.99) - 1, 0)]
          min_resp = elapsed_values[0]
          max_resp = elapsed_values[-1]

          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              print(f"avg_response={avg_response:.0f}", file=fh)
              print(f"error_rate={error_rate:.2f}", file=fh)
              print(f"total_requests={total_count}", file=fh)
              print(f"p90={p90}", file=fh)
              print(f"p95={p95}", file=fh)
              print(f"p99={p99}", file=fh)
              print(f"min_response={min_resp}", file=fh)
              print(f"max_response={max_resp}", file=fh)
              print(f"error_count={error_count}", file=fh)

          violations = []
          if avg_response > 2000:
              violations.append(f"Avg response {avg_response:.0f}ms exceeds 2000ms")
          if error_rate > 1.0:
              violations.append(f"Error rate {error_rate:.2f}% exceeds 1%")

          if violations:
              print("\n=== PERFORMANCE GATE FAILURES ===")
              for v in violations: print(v)
              sys.exit(1)
          else:
              print("\n=== ALL PERFORMANCE GATES PASSED ===")
          EOF

      - name: Upload Load Test HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-html-report
          path: ${{ env.REPORTS_DIR }}/load
          retention-days: 30

      - name: Upload Load Test JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-jtl-results
          path: ${{ env.RESULTS_DIR }}/load.jtl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 3: STRESS TEST
  # ─────────────────────────────────────────────────────────────
  stress-test:
    name: "Stress Test (300 Users)"
    runs-on: ubuntu-latest
    needs: load-test
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'stress')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache JMeter installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download & Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz

      - name: Create results directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}/stress

      - name: Run Stress Test (300 users)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t ${{ github.workspace }}/${{ env.JMX_FILE }} \
            -l ${{ env.RESULTS_DIR }}/stress.jtl \
            -e -o ${{ env.REPORTS_DIR }}/stress \
            -Jthreads=300 \
            -Jrampup=180 \
            -Jloops=1
        continue-on-error: true

      - name: Upload Stress Test HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-html-report
          path: ${{ env.REPORTS_DIR }}/stress
          retention-days: 30

      - name: Upload Stress Test JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-jtl-results
          path: ${{ env.RESULTS_DIR }}/stress.jtl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 4: ENDURANCE TEST
  # ─────────────────────────────────────────────────────────────
  endurance-test:
    name: "Endurance Test (150 Users, 30 min)"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'endurance'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache JMeter installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download & Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz

      - name: Create results directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}/endurance

      - name: Run Endurance Test (150 users, 30 min)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t ${{ github.workspace }}/${{ env.JMX_FILE }} \
            -l ${{ env.RESULTS_DIR }}/endurance.jtl \
            -e -o ${{ env.REPORTS_DIR }}/endurance \
            -Jthreads=150 \
            -Jrampup=120 \
            -Jduration=1800
        continue-on-error: true

      - name: Upload Endurance Test HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: endurance-html-report
          path: ${{ env.REPORTS_DIR }}/endurance
          retention-days: 30

      - name: Upload Endurance Test JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: endurance-jtl-results
          path: ${{ env.RESULTS_DIR }}/endurance.jtl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 5: NOTIFY
  # ─────────────────────────────────────────────────────────────
  notify:
    name: "Post Results Summary"
    runs-on: ubuntu-latest
    needs: [baseline-test, load-test, stress-test, endurance-test]
    if: always() && !cancelled()

    steps:
      - name: Build summary variables
        id: summary
        run: |
          BASELINE="${{ needs.baseline-test.result }}"
          LOAD="${{ needs.load-test.result }}"
          STRESS="${{ needs.stress-test.result }}"
          ENDURANCE="${{ needs.endurance-test.result }}"

          OVERALL="passed"
          for RESULT in "$BASELINE" "$LOAD" "$STRESS" "$ENDURANCE"; do
            if [[ "$RESULT" == "failure" || "$RESULT" == "cancelled" ]]; then
              OVERALL="failed"
              break
            fi
          done

          echo "baseline=$BASELINE"   >> $GITHUB_OUTPUT
          echo "load=$LOAD"           >> $GITHUB_OUTPUT
          echo "stress=$STRESS"       >> $GITHUB_OUTPUT
          echo "endurance=$ENDURANCE" >> $GITHUB_OUTPUT
          echo "overall=$OVERALL"     >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # ── 1. PR comment ─────────────────────────────────────────
      - name: Post PR Comment with Results Summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const baseline  = "${{ needs.baseline-test.result }}";
            const load      = "${{ needs.load-test.result }}";
            const stress    = "${{ needs.stress-test.result }}";
            const endurance = "${{ needs.endurance-test.result }}";
            const overall   = "${{ steps.summary.outputs.overall }}";
            const emoji     = overall === "passed" ? "✅" : "❌";

            const statusIcon = (r) =>
              r === "success"   ? "✅ PASSED"    :
              r === "failure"   ? "❌ FAILED"    :
              r === "cancelled" ? "⚠️ CANCELLED" : "⏭️ SKIPPED";

            const body = [
              "## 🚀 DemoBlaze Performance Test Results — " + emoji + " " + overall.toUpperCase(),
              "",
              "| Test | Users | Status |",
              "|------|-------|--------|",
              "| Baseline  | 50  | " + statusIcon(baseline)  + " |",
              "| Load      | 150 | " + statusIcon(load)      + " |",
              "| Stress    | 300 | " + statusIcon(stress)    + " |",
              "| Endurance | 150 | " + statusIcon(endurance) + " |",
              "",
              "### Thresholds Applied",
              "| Metric | Target |",
              "|--------|--------|",
              "| Avg Response Time | < 2000ms |",
              "| Error Rate | < 1% |",
              "",
              "📊 Download full HTML Dashboard reports from **Actions → Artifacts**.",
              "🔗 [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            ].join("\n");

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # ── 2. Build Slack payload using Python (no JS syntax issues) ──
      # Python writes a JSON file; the Slack action reads it directly.
      - name: Build Slack payload
        id: slack-payload
        run: |
          python3 << 'PYEOF'
          import json, os

          def fmt(val, unit="ms"):
              return f"{val}{unit}" if val else "N/A"

          overall         = os.environ.get("OVERALL", "failed")
          short_sha       = os.environ.get("SHORT_SHA", "unknown")
          baseline        = os.environ.get("BASELINE_RESULT", "skipped")
          load            = os.environ.get("LOAD_RESULT", "skipped")
          stress          = os.environ.get("STRESS_RESULT", "skipped")
          endurance       = os.environ.get("ENDURANCE_RESULT", "skipped")
          trigger         = os.environ.get("TRIGGER", "")
          repo            = os.environ.get("REPO", "")
          branch          = os.environ.get("BRANCH", "")
          run_url         = os.environ.get("RUN_URL", "")
          run_number      = os.environ.get("RUN_NUMBER", "")
          workflow        = os.environ.get("WORKFLOW", "")

          b_avg    = fmt(os.environ.get("B_AVG"))
          b_err    = fmt(os.environ.get("B_ERR"), "%")
          b_total  = os.environ.get("B_TOTAL") or "N/A"
          b_p90    = fmt(os.environ.get("B_P90"))
          b_p95    = fmt(os.environ.get("B_P95"))
          b_p99    = fmt(os.environ.get("B_P99"))
          b_min    = fmt(os.environ.get("B_MIN"))
          b_max    = fmt(os.environ.get("B_MAX"))
          b_errors = os.environ.get("B_ERRORS") or "N/A"

          l_avg    = fmt(os.environ.get("L_AVG"))
          l_err    = fmt(os.environ.get("L_ERR"), "%")
          l_total  = os.environ.get("L_TOTAL") or "N/A"
          l_p90    = fmt(os.environ.get("L_P90"))
          l_p95    = fmt(os.environ.get("L_P95"))

          passed       = overall == "passed"
          color        = "#2eb886" if passed else "#e01e5a"
          header_emoji = "✅" if passed else "❌"
          header_label = "All Performance Gates Passed" if passed else "Performance Gate Failure Detected"

          trigger_labels = {
              "push":              "Push",
              "pull_request":      "Pull Request",
              "schedule":          "Scheduled (Nightly)",
              "workflow_dispatch": "Manual Trigger",
          }
          trigger_label = trigger_labels.get(trigger, trigger)

          def status_text(r):
              return {
                  "success":   "✅  Passed",
                  "failure":   "❌  Failed",
                  "cancelled": "⚠️  Cancelled",
              }.get(r, "⏭️  Skipped")

          blocks = [
              {
                  "type": "header",
                  "text": {
                      "type": "plain_text",
                      "text": f"{header_emoji}  DemoBlaze Performance Tests — {header_label}",
                      "emoji": True
                  }
              },
              {
                  "type": "section",
                  "fields": [
                      {"type": "mrkdwn", "text": f"*Repository*\n{repo}"},
                      {"type": "mrkdwn", "text": f"*Branch*\n`{branch}`"},
                      {"type": "mrkdwn", "text": f"*Triggered By*\n{trigger_label}"},
                      {"type": "mrkdwn", "text": f"*Commit*\n`{short_sha}`"},
                  ]
              },
              {"type": "divider"},
              {
                  "type": "section",
                  "text": {"type": "mrkdwn", "text": "*Test Results*"}
              },
              {
                  "type": "section",
                  "fields": [
                      {"type": "mrkdwn", "text": f"*Baseline*  (50 users)\n{status_text(baseline)}"},
                      {"type": "mrkdwn", "text": f"*Load*  (150 users)\n{status_text(load)}"},
                      {"type": "mrkdwn", "text": f"*Stress*  (300 users)\n{status_text(stress)}"},
                      {"type": "mrkdwn", "text": f"*Endurance*  (150 users / 30 min)\n{status_text(endurance)}"},
                  ]
              },
          ]

          # Baseline metrics block — only when the job actually ran
          if baseline in ("success", "failure"):
              blocks += [
                  {"type": "divider"},
                  {"type": "section", "text": {"type": "mrkdwn", "text": "*📊 Baseline Metrics  (50 users)*"}},
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"*Total Requests*\n{b_total}"},
                          {"type": "mrkdwn", "text": f"*Errors*\n{b_errors}"},
                          {"type": "mrkdwn", "text": f"*Avg Response*\n{b_avg}"},
                          {"type": "mrkdwn", "text": f"*Error Rate*\n{b_err}"},
                          {"type": "mrkdwn", "text": f"*P90 / P95 / P99*\n{b_p90} / {b_p95} / {b_p99}"},
                          {"type": "mrkdwn", "text": f"*Min / Max*\n{b_min} / {b_max}"},
                      ]
                  },
              ]

          # Load metrics block — only when the job actually ran
          if load in ("success", "failure"):
              blocks += [
                  {"type": "divider"},
                  {"type": "section", "text": {"type": "mrkdwn", "text": "*📊 Load Metrics  (150 users)*"}},
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"*Total Requests*\n{l_total}"},
                          {"type": "mrkdwn", "text": f"*Avg Response*\n{l_avg}"},
                          {"type": "mrkdwn", "text": f"*Error Rate*\n{l_err}"},
                          {"type": "mrkdwn", "text": f"*P90 / P95*\n{l_p90} / {l_p95}"},
                      ]
                  },
              ]

          blocks += [
              {"type": "divider"},
              {
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": (
                          "*Performance Thresholds*\n"
                          "• Avg Response Time: `< 2000ms`\n"
                          "• Error Rate: `< 1%`\n"
                          "• _Checkout endpoint excluded from error rate — known 404 on demo env_"
                      )
                  }
              },
              {
                  "type": "actions",
                  "elements": [
                      {
                          "type": "button",
                          "text": {"type": "plain_text", "text": "View Full Run & Artifacts", "emoji": True},
                          "url": run_url,
                          "style": "primary"
                      }
                  ]
              },
              {
                  "type": "context",
                  "elements": [
                      {
                          "type": "mrkdwn",
                          "text": f"Run #{run_number} • {workflow} • HTML reports available as artifacts for 30 days"
                      }
                  ]
              },
          ]

          payload = {"attachments": [{"color": color, "blocks": blocks}]}

          with open("slack_payload.json", "w") as f:
              json.dump(payload, f)

          print("Slack payload written to slack_payload.json")
          PYEOF
        env:
          OVERALL:          ${{ steps.summary.outputs.overall }}
          SHORT_SHA:        ${{ steps.summary.outputs.short_sha }}
          BASELINE_RESULT:  ${{ needs.baseline-test.result }}
          LOAD_RESULT:      ${{ needs.load-test.result }}
          STRESS_RESULT:    ${{ needs.stress-test.result }}
          ENDURANCE_RESULT: ${{ needs.endurance-test.result }}
          TRIGGER:          ${{ github.event_name }}
          REPO:             ${{ github.repository }}
          BRANCH:           ${{ github.ref_name }}

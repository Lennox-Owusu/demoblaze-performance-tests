name: DemoBlaze Performance Tests

on:
  # Trigger on pull requests to main branch (runs baseline only — fast feedback)
  pull_request:
    branches:
      - main

  # Nightly scheduled run — full load + stress test suite
  schedule:
    - cron: '0 1 * * *'   # Runs every day at 1:00 AM UTC

  # Manual trigger — allows selecting which test to run on demand
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select which test to run'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - load
          - stress
          - endurance

env:
  JMETER_VERSION: 5.6.3
  JMETER_HOME: ${{ github.workspace }}/apache-jmeter-5.6.3
  JMX_FILE: DemoBlaze_Complete_TestPlan_v2.jmx
  RESULTS_DIR: ${{ github.workspace }}/results
  REPORTS_DIR: ${{ github.workspace }}/html-reports

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: BASELINE TEST
  # Runs on: pull_request + manual (baseline) + nightly schedule
  # ─────────────────────────────────────────────────────────────
  baseline-test:
    name: "Baseline Test (50 Users)"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'baseline') ||
      github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache JMeter installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download & Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          echo "JMeter ${{ env.JMETER_VERSION }} installed successfully"

      - name: Create results directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}/baseline

      - name: Run Baseline Test (50 users)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t ${{ github.workspace }}/${{ env.JMX_FILE }} \
            -l ${{ env.RESULTS_DIR }}/baseline.jtl \
            -e -o ${{ env.REPORTS_DIR }}/baseline \
            -Jthreads=50 \
            -Jrampup=50 \
            -Jloops=3
        continue-on-error: true

      - name: Check Performance Thresholds
        id: baseline-thresholds
        run: |
          python3 << 'EOF'
          import csv, sys, os

          jtl_file = "${{ env.RESULTS_DIR }}/baseline.jtl"
          error_count = 0
          total_count = 0
          total_elapsed = 0
          violations = []

          # Known issue: Checkout (07 - Checkout / Place Order) returns 404
          # on DemoBlaze demo environment. Excluded from error rate gate.
          EXCLUDED_SAMPLER = "07 - Checkout (Place Order)"

          with open(jtl_file, newline='') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  label = row.get('label', '')
                  if EXCLUDED_SAMPLER in label:
                      continue
                  total_count += 1
                  elapsed = int(row.get('elapsed', 0))
                  total_elapsed += elapsed
                  success = row.get('success', 'true').lower()
                  if success != 'true':
                      error_count += 1

          if total_count == 0:
              print("ERROR: No results found in JTL file!")
              sys.exit(1)

          avg_response = total_elapsed / total_count
          error_rate = (error_count / total_count) * 100

          print(f"Total Requests  : {total_count} (excl. Checkout)")
          print(f"Avg Response    : {avg_response:.0f}ms")
          print(f"Error Rate      : {error_rate:.2f}% (excl. Checkout 404)")
          print(f"Note: Checkout excluded — known 404 on DemoBlaze demo API")

          # Write metrics to GITHUB_OUTPUT for use in Slack notification
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              print(f"avg_response={avg_response:.0f}", file=fh)
              print(f"error_rate={error_rate:.2f}", file=fh)
              print(f"total_requests={total_count}", file=fh)

          if avg_response > 2000:
              violations.append(f"FAIL: Avg response {avg_response:.0f}ms exceeds 2000ms threshold")
          if error_rate > 1.0:
              violations.append(f"FAIL: Error rate {error_rate:.2f}% exceeds 1% threshold")

          if violations:
              print("\n=== PERFORMANCE GATE FAILURES ===")
              for v in violations:
                  print(v)
              sys.exit(1)
          else:
              print("\n=== ALL PERFORMANCE GATES PASSED ===")
          EOF

      - name: Upload Baseline HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-html-report
          path: ${{ env.REPORTS_DIR }}/baseline
          retention-days: 30

      - name: Upload Baseline JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-jtl-results
          path: ${{ env.RESULTS_DIR }}/baseline.jtl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 2: LOAD TEST
  # Runs on: nightly schedule + manual (load)
  # ─────────────────────────────────────────────────────────────
  load-test:
    name: "Load Test (150 Users)"
    runs-on: ubuntu-latest
    needs: baseline-test
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'load')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache JMeter installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download & Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz

      - name: Create results directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}/load

      - name: Run Load Test (150 users)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t ${{ github.workspace }}/${{ env.JMX_FILE }} \
            -l ${{ env.RESULTS_DIR }}/load.jtl \
            -e -o ${{ env.REPORTS_DIR }}/load \
            -Jthreads=150 \
            -Jrampup=120 \
            -Jloops=2
        continue-on-error: true

      - name: Check Performance Thresholds
        id: load-thresholds
        run: |
          python3 << 'EOF'
          import csv, sys, os

          jtl_file = "${{ env.RESULTS_DIR }}/load.jtl"
          error_count = 0
          total_count = 0
          total_elapsed = 0

          with open(jtl_file, newline='') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  total_count += 1
                  total_elapsed += int(row.get('elapsed', 0))
                  if row.get('success', 'true').lower() != 'true':
                      error_count += 1

          avg_response = total_elapsed / total_count if total_count else 0
          error_rate = (error_count / total_count) * 100 if total_count else 0

          print(f"Total Requests  : {total_count}")
          print(f"Avg Response    : {avg_response:.0f}ms")
          print(f"Error Rate      : {error_rate:.2f}%")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              print(f"avg_response={avg_response:.0f}", file=fh)
              print(f"error_rate={error_rate:.2f}", file=fh)
              print(f"total_requests={total_count}", file=fh)

          violations = []
          if avg_response > 2000:
              violations.append(f"FAIL: Avg response {avg_response:.0f}ms exceeds 2000ms")
          if error_rate > 1.0:
              violations.append(f"FAIL: Error rate {error_rate:.2f}% exceeds 1%")

          if violations:
              print("\n=== PERFORMANCE GATE FAILURES ===")
              for v in violations: print(v)
              sys.exit(1)
          else:
              print("\n=== ALL PERFORMANCE GATES PASSED ===")
          EOF

      - name: Upload Load Test HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-html-report
          path: ${{ env.REPORTS_DIR }}/load
          retention-days: 30

      - name: Upload Load Test JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-jtl-results
          path: ${{ env.RESULTS_DIR }}/load.jtl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 3: STRESS TEST
  # Runs on: nightly schedule + manual (stress)
  # ─────────────────────────────────────────────────────────────
  stress-test:
    name: "Stress Test (300 Users)"
    runs-on: ubuntu-latest
    needs: load-test
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'stress')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache JMeter installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download & Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz

      - name: Create results directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}/stress

      - name: Run Stress Test (300 users)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t ${{ github.workspace }}/${{ env.JMX_FILE }} \
            -l ${{ env.RESULTS_DIR }}/stress.jtl \
            -e -o ${{ env.REPORTS_DIR }}/stress \
            -Jthreads=300 \
            -Jrampup=180 \
            -Jloops=1
        continue-on-error: true

      - name: Upload Stress Test HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-html-report
          path: ${{ env.REPORTS_DIR }}/stress
          retention-days: 30

      - name: Upload Stress Test JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-jtl-results
          path: ${{ env.RESULTS_DIR }}/stress.jtl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 4: ENDURANCE TEST
  # Runs on: manual trigger only (takes 30+ minutes)
  # ─────────────────────────────────────────────────────────────
  endurance-test:
    name: "Endurance Test (150 Users, 30 min)"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'endurance'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache JMeter installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download & Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz

      - name: Create results directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}/endurance

      - name: Run Endurance Test (150 users, 30 min)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t ${{ github.workspace }}/${{ env.JMX_FILE }} \
            -l ${{ env.RESULTS_DIR }}/endurance.jtl \
            -e -o ${{ env.REPORTS_DIR }}/endurance \
            -Jthreads=150 \
            -Jrampup=120 \
            -Jduration=1800
        continue-on-error: true

      - name: Upload Endurance Test HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: endurance-html-report
          path: ${{ env.REPORTS_DIR }}/endurance
          retention-days: 30

      - name: Upload Endurance Test JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: endurance-jtl-results
          path: ${{ env.RESULTS_DIR }}/endurance.jtl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 5: NOTIFY — PR comment + Slack + Email
  # Runs on: all event types, after whichever jobs ran
  # ─────────────────────────────────────────────────────────────
  notify:
    name: "Post Results Summary"
    runs-on: ubuntu-latest
    needs: [baseline-test, load-test, stress-test, endurance-test]
    if: always() && !cancelled()

    steps:
      # ── Determine which tests actually ran and their outcomes ──
      - name: Build summary variables
        id: summary
        run: |
          BASELINE="${{ needs.baseline-test.result }}"
          LOAD="${{ needs.load-test.result }}"
          STRESS="${{ needs.stress-test.result }}"
          ENDURANCE="${{ needs.endurance-test.result }}"

          # Overall status: failed if any non-skipped job failed
          OVERALL="passed"
          for RESULT in "$BASELINE" "$LOAD" "$STRESS" "$ENDURANCE"; do
            if [[ "$RESULT" == "failure" || "$RESULT" == "cancelled" ]]; then
              OVERALL="failed"
              break
            fi
          done

          echo "baseline=$BASELINE"   >> $GITHUB_OUTPUT
          echo "load=$LOAD"           >> $GITHUB_OUTPUT
          echo "stress=$STRESS"       >> $GITHUB_OUTPUT
          echo "endurance=$ENDURANCE" >> $GITHUB_OUTPUT
          echo "overall=$OVERALL"     >> $GITHUB_OUTPUT

          # Status icons for Slack text fields
          status_icon() {
            case "$1" in
              success)   echo "✅ Passed"  ;;
              failure)   echo "❌ Failed"  ;;
              cancelled) echo "⚠️ Cancelled" ;;
              *)         echo "⏭️ Skipped"  ;;
            esac
          }
          echo "baseline_icon=$(status_icon $BASELINE)"   >> $GITHUB_OUTPUT
          echo "load_icon=$(status_icon $LOAD)"           >> $GITHUB_OUTPUT
          echo "stress_icon=$(status_icon $STRESS)"       >> $GITHUB_OUTPUT
          echo "endurance_icon=$(status_icon $ENDURANCE)" >> $GITHUB_OUTPUT

          if [[ "$OVERALL" == "passed" ]]; then
            echo "overall_emoji=✅"    >> $GITHUB_OUTPUT
            echo "slack_color=#2eb886" >> $GITHUB_OUTPUT   # green
            echo "header_text=All Performance Gates Passed" >> $GITHUB_OUTPUT
          else
            echo "overall_emoji=❌"    >> $GITHUB_OUTPUT
            echo "slack_color=#e01e5a" >> $GITHUB_OUTPUT   # red
            echo "header_text=Performance Gate Failure Detected" >> $GITHUB_OUTPUT
          fi

          # Short commit SHA for display
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # ── 1. PR comment (pull_request events only) ──────────────
      - name: Post PR Comment with Results Summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const baseline  = "${{ steps.summary.outputs.baseline }}";
            const load      = "${{ steps.summary.outputs.load }}";
            const stress    = "${{ steps.summary.outputs.stress }}";
            const endurance = "${{ steps.summary.outputs.endurance }}";
            const overall   = "${{ steps.summary.outputs.overall }}";
            const emoji     = overall === "passed" ? "✅" : "❌";

            const statusIcon = (r) =>
              r === "success"   ? "✅ PASSED"    :
              r === "failure"   ? "❌ FAILED"    :
              r === "cancelled" ? "⚠️ CANCELLED" : "⏭️ SKIPPED";

            const body = `## 🚀 DemoBlaze Performance Test Results — ${emoji} ${overall.toUpperCase()}

            | Test | Users | Status |
            |------|-------|--------|
            | Baseline  | 50  | ${statusIcon(baseline)}  |
            | Load      | 150 | ${statusIcon(load)}      |
            | Stress    | 300 | ${statusIcon(stress)}    |
            | Endurance | 150 | ${statusIcon(endurance)} |

            ### Thresholds Applied
            | Metric | Target |
            |--------|--------|
            | Avg Response Time | < 2000ms |
            | Error Rate | < 1% |

            📊 Download full HTML Dashboard reports from **Actions → Artifacts**.
            🔗 [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # ── 2. Slack notification (all event types) ───────────────
      # Uses Block Kit for a structured, readable message matching
      # the header + colored sidebar + fields layout from the screenshot.
      #
      # Required secret: SLACK_WEBHOOK_URL
      # Set up at: Slack → Apps → Incoming Webhooks → Add to Workspace
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.summary.outputs.slack_color }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "${{ steps.summary.outputs.overall_emoji }} DemoBlaze Performance Tests — ${{ steps.summary.outputs.header_text }}",
                        "emoji": true
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Repository*\n${{ github.repository }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Branch*\n`${{ github.ref_name }}`"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Triggered By*\n${{ github.event_name }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Commit*\n`${{ steps.summary.outputs.short_sha }}`"
                        }
                      ]
                    },
                    {
                      "type": "divider"
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Test Results*"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Baseline* (50 users)\n${{ steps.summary.outputs.baseline_icon }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Load* (150 users)\n${{ steps.summary.outputs.load_icon }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Stress* (300 users)\n${{ steps.summary.outputs.stress_icon }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Endurance* (150 users / 30 min)\n${{ steps.summary.outputs.endurance_icon }}"
                        }
                      ]
                    },
                    {
                      "type": "divider"
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Performance Thresholds*\n• Avg Response Time: < 2000ms\n• Error Rate: < 1%"
                      }
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": {
                            "type": "plain_text",
                            "text": "View Full Run & Artifacts",
                            "emoji": true
                          },
                          "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                          "style": "primary"
                        }
                      ]
                    },
                    {
                      "type": "context",
                      "elements": [
                        {
                          "type": "mrkdwn",
                          "text": "Run #${{ github.run_number }} • ${{ github.workflow }} • HTML reports available as artifacts for 30 days"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # ── 3. Email notification (all event types) ───────────────
      # Requires secrets: EMAIL_USERNAME, EMAIL_PASSWORD, NOTIFY_EMAIL
      # Gmail users: enable 2FA then generate an App Password at
      # https://myaccount.google.com/apppasswords and store it as EMAIL_PASSWORD
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "DemoBlaze Perf Tests — ${{ steps.summary.outputs.overall_emoji }} ${{ steps.summary.outputs.overall }} (${{ github.event_name }} / ${{ github.ref_name }})"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "GitHub Actions <${{ secrets.EMAIL_USERNAME }}>"
          body: |
            DemoBlaze Performance Test run completed.

            Overall Status : ${{ steps.summary.outputs.overall_emoji }} ${{ steps.summary.outputs.overall }}
            Triggered By   : ${{ github.event_name }}
            Branch         : ${{ github.ref_name }}
            Commit         : ${{ github.sha }}
            Run Number     : #${{ github.run_number }}

            ── Test Results ──────────────────────────────
            Baseline  (50 users)          : ${{ steps.summary.outputs.baseline_icon }}
            Load      (150 users)         : ${{ steps.summary.outputs.load_icon }}
            Stress    (300 users)         : ${{ steps.summary.outputs.stress_icon }}
            Endurance (150 users / 30min) : ${{ steps.summary.outputs.endurance_icon }}

            ── Thresholds Applied ────────────────────────
            Avg Response Time : < 2000ms
            Error Rate        : < 1%

            ── Links ─────────────────────────────────────
            Full run & artifacts:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

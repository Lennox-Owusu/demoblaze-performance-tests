name: DemoBlaze Performance Tests

on:
  # Trigger on pull requests to main branch (runs baseline only — fast feedback)
  pull_request:
    branches:
      - main

  # Nightly scheduled run — full load + stress test suite
  schedule:
    - cron: '0 1 * * *'   # Runs every day at 1:00 AM UTC

  # Manual trigger — allows selecting which test to run on demand
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select which test to run'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - load
          - stress
          - endurance

env:
  JMETER_VERSION: 5.6.3
  JMETER_HOME: ${{ github.workspace }}/apache-jmeter-5.6.3
  JMX_FILE: DemoBlaze_Complete_TestPlan_v2.jmx
  RESULTS_DIR: ${{ github.workspace }}/results
  REPORTS_DIR: ${{ github.workspace }}/html-reports

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: BASELINE TEST
  # Runs on: pull_request + manual (baseline) + nightly schedule
  # ─────────────────────────────────────────────────────────────
  baseline-test:
    name: "Baseline Test (50 Users)"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'baseline') ||
      github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache JMeter installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download & Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          echo "JMeter ${{ env.JMETER_VERSION }} installed successfully"

      - name: Create results directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}/baseline

      - name: Run Baseline Test (50 users)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t ${{ github.workspace }}/${{ env.JMX_FILE }} \
            -l ${{ env.RESULTS_DIR }}/baseline.jtl \
            -e -o ${{ env.REPORTS_DIR }}/baseline \
            -Jthreads=50 \
            -Jrampup=50 \
            -Jloops=3
        continue-on-error: true

      - name: Check Performance Thresholds
        run: |
          python3 << 'EOF'
          import csv, sys

          jtl_file = "${{ env.RESULTS_DIR }}/baseline.jtl"
          error_count = 0
          total_count = 0
          total_elapsed = 0
          violations = []

          with open(jtl_file, newline='') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  total_count += 1
                  elapsed = int(row.get('elapsed', 0))
                  total_elapsed += elapsed
                  success = row.get('success', 'true').lower()
                  if success != 'true':
                      error_count += 1

          if total_count == 0:
              print("ERROR: No results found in JTL file!")
              sys.exit(1)

          avg_response = total_elapsed / total_count
          error_rate = (error_count / total_count) * 100

          print(f"Total Requests  : {total_count}")
          print(f"Avg Response    : {avg_response:.0f}ms")
          print(f"Error Rate      : {error_rate:.2f}%")

          if avg_response > 2000:
              violations.append(f"FAIL: Avg response {avg_response:.0f}ms exceeds 2000ms threshold")
          if error_rate > 1.0:
              violations.append(f"FAIL: Error rate {error_rate:.2f}% exceeds 1% threshold")

          if violations:
              print("\n=== PERFORMANCE GATE FAILURES ===")
              for v in violations:
                  print(v)
              sys.exit(1)
          else:
              print("\n=== ALL PERFORMANCE GATES PASSED ===")
          EOF

      - name: Upload Baseline HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-html-report
          path: ${{ env.REPORTS_DIR }}/baseline
          retention-days: 30

      - name: Upload Baseline JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-jtl-results
          path: ${{ env.RESULTS_DIR }}/baseline.jtl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 2: LOAD TEST
  # Runs on: nightly schedule + manual (load)
  # ─────────────────────────────────────────────────────────────
  load-test:
    name: "Load Test (150 Users)"
    runs-on: ubuntu-latest
    needs: baseline-test
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'load')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache JMeter installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download & Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz

      - name: Create results directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}/load

      - name: Run Load Test (150 users)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t ${{ github.workspace }}/${{ env.JMX_FILE }} \
            -l ${{ env.RESULTS_DIR }}/load.jtl \
            -e -o ${{ env.REPORTS_DIR }}/load \
            -Jthreads=150 \
            -Jrampup=120 \
            -Jloops=2
        continue-on-error: true

      - name: Check Performance Thresholds
        run: |
          python3 << 'EOF'
          import csv, sys

          jtl_file = "${{ env.RESULTS_DIR }}/load.jtl"
          error_count = 0
          total_count = 0
          total_elapsed = 0

          with open(jtl_file, newline='') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  total_count += 1
                  total_elapsed += int(row.get('elapsed', 0))
                  if row.get('success', 'true').lower() != 'true':
                      error_count += 1

          avg_response = total_elapsed / total_count if total_count else 0
          error_rate = (error_count / total_count) * 100 if total_count else 0

          print(f"Total Requests  : {total_count}")
          print(f"Avg Response    : {avg_response:.0f}ms")
          print(f"Error Rate      : {error_rate:.2f}%")

          violations = []
          if avg_response > 2000:
              violations.append(f"FAIL: Avg response {avg_response:.0f}ms exceeds 2000ms")
          if error_rate > 1.0:
              violations.append(f"FAIL: Error rate {error_rate:.2f}% exceeds 1%")

          if violations:
              print("\n=== PERFORMANCE GATE FAILURES ===")
              for v in violations: print(v)
              sys.exit(1)
          else:
              print("\n=== ALL PERFORMANCE GATES PASSED ===")
          EOF

      - name: Upload Load Test HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-html-report
          path: ${{ env.REPORTS_DIR }}/load
          retention-days: 30

      - name: Upload Load Test JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-jtl-results
          path: ${{ env.RESULTS_DIR }}/load.jtl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 3: STRESS TEST
  # Runs on: nightly schedule + manual (stress)
  # ─────────────────────────────────────────────────────────────
  stress-test:
    name: "Stress Test (300 Users)"
    runs-on: ubuntu-latest
    needs: load-test
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'stress')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache JMeter installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download & Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz

      - name: Create results directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}/stress

      - name: Run Stress Test (300 users)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t ${{ github.workspace }}/${{ env.JMX_FILE }} \
            -l ${{ env.RESULTS_DIR }}/stress.jtl \
            -e -o ${{ env.REPORTS_DIR }}/stress \
            -Jthreads=300 \
            -Jrampup=180 \
            -Jloops=1
        continue-on-error: true

      - name: Upload Stress Test HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-html-report
          path: ${{ env.REPORTS_DIR }}/stress
          retention-days: 30

      - name: Upload Stress Test JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-jtl-results
          path: ${{ env.RESULTS_DIR }}/stress.jtl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 4: ENDURANCE TEST
  # Runs on: manual trigger only (takes 30+ minutes)
  # ─────────────────────────────────────────────────────────────
  endurance-test:
    name: "Endurance Test (150 Users, 30 min)"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'endurance'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache JMeter installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download & Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz

      - name: Create results directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}/endurance

      - name: Run Endurance Test (150 users, 30 min)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t ${{ github.workspace }}/${{ env.JMX_FILE }} \
            -l ${{ env.RESULTS_DIR }}/endurance.jtl \
            -e -o ${{ env.REPORTS_DIR }}/endurance \
            -Jthreads=150 \
            -Jrampup=120 \
            -Jduration=1800
        continue-on-error: true

      - name: Upload Endurance Test HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: endurance-html-report
          path: ${{ env.REPORTS_DIR }}/endurance
          retention-days: 30

      - name: Upload Endurance Test JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: endurance-jtl-results
          path: ${{ env.RESULTS_DIR }}/endurance.jtl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 5: NOTIFY — Summary comment on PR
  # ─────────────────────────────────────────────────────────────
  notify:
    name: "Post Results Summary"
    runs-on: ubuntu-latest
    needs: [baseline-test]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Post PR Comment with Results Summary
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🚀 DemoBlaze Performance Test Results

            | Test | Status | Details |
            |------|--------|---------|
            | Baseline (50 users) | ${{ needs.baseline-test.result == 'success' && '✅ PASSED' || '❌ FAILED' }} | See artifacts for HTML report |

            ### Thresholds
            | Metric | Target | Result |
            |--------|--------|--------|
            | Avg Response Time | < 2000ms | See report |
            | Error Rate | < 1% | See report |

            📊 Download the full HTML Dashboard report from the **Actions > Artifacts** section.
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

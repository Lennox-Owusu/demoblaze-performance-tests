name: DemoBlaze Performance Tests

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select which test to run'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - load
          - stress
          - endurance

env:
  JMETER_VERSION: 5.6.3
  JMETER_HOME: ${{ github.workspace }}/apache-jmeter-5.6.3
  JMX_FILE: DemoBlaze_Complete_TestPlan_v2.jmx
  RESULTS_DIR: ${{ github.workspace }}/results
  REPORTS_DIR: ${{ github.workspace }}/html-reports

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: BASELINE TEST
  # ─────────────────────────────────────────────────────────────
  baseline-test:
    name: "Baseline Test (50 Users)"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'baseline') ||
      github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache JMeter installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download & Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz

      - name: Create results directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}/baseline

      - name: Run Baseline Test (50 users)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t ${{ github.workspace }}/${{ env.JMX_FILE }} \
            -l ${{ env.RESULTS_DIR }}/baseline.jtl \
            -e -o ${{ env.REPORTS_DIR }}/baseline \
            -Jthreads=50 \
            -Jrampup=50 \
            -Jloops=3
        continue-on-error: true

      - name: Check Performance Thresholds
        id: baseline-thresholds
        run: |
          python3 << 'EOF'
          import csv, sys, os, json

          jtl_file = "${{ env.RESULTS_DIR }}/baseline.jtl"
          EXCLUDED_SAMPLER = "07 - Checkout (Place Order)"

          error_count = 0
          total_count = 0
          total_elapsed = 0
          elapsed_values = []
          violations = []

          with open(jtl_file, newline='') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  label = row.get('label', '')
                  if EXCLUDED_SAMPLER in label:
                      continue
                  total_count += 1
                  elapsed = int(row.get('elapsed', 0))
                  total_elapsed += elapsed
                  elapsed_values.append(elapsed)
                  if row.get('success', 'true').lower() != 'true':
                      error_count += 1

          if total_count == 0:
              print("ERROR: No results found in JTL file!")
              sys.exit(1)

          elapsed_values.sort()
          avg_response = total_elapsed / total_count
          error_rate = (error_count / total_count) * 100
          p90_idx = int(total_count * 0.90) - 1
          p95_idx = int(total_count * 0.95) - 1
          p99_idx = int(total_count * 0.99) - 1
          p90 = elapsed_values[max(p90_idx, 0)]
          p95 = elapsed_values[max(p95_idx, 0)]
          p99 = elapsed_values[max(p99_idx, 0)]
          min_resp = elapsed_values[0]
          max_resp = elapsed_values[-1]

          print(f"Total Requests  : {total_count} (excl. Checkout)")
          print(f"Avg Response    : {avg_response:.0f}ms")
          print(f"Error Rate      : {error_rate:.2f}%")
          print(f"P90             : {p90}ms")
          print(f"P95             : {p95}ms")
          print(f"P99             : {p99}ms")
          print(f"Min             : {min_resp}ms")
          print(f"Max             : {max_resp}ms")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              print(f"avg_response={avg_response:.0f}", file=fh)
              print(f"error_rate={error_rate:.2f}", file=fh)
              print(f"total_requests={total_count}", file=fh)
              print(f"p90={p90}", file=fh)
              print(f"p95={p95}", file=fh)
              print(f"p99={p99}", file=fh)
              print(f"min_response={min_resp}", file=fh)
              print(f"max_response={max_resp}", file=fh)
              print(f"error_count={error_count}", file=fh)

          if avg_response > 2000:
              violations.append(f"Avg response {avg_response:.0f}ms exceeds 2000ms threshold")
          if error_rate > 1.0:
              violations.append(f"Error rate {error_rate:.2f}% exceeds 1% threshold")

          if violations:
              print("\n=== PERFORMANCE GATE FAILURES ===")
              for v in violations:
                  print(v)
              sys.exit(1)
          else:
              print("\n=== ALL PERFORMANCE GATES PASSED ===")
          EOF

      - name: Upload Baseline HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-html-report
          path: ${{ env.REPORTS_DIR }}/baseline
          retention-days: 30

      - name: Upload Baseline JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-jtl-results
          path: ${{ env.RESULTS_DIR }}/baseline.jtl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 2: LOAD TEST
  # ─────────────────────────────────────────────────────────────
  load-test:
    name: "Load Test (150 Users)"
    runs-on: ubuntu-latest
    needs: baseline-test
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'load')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache JMeter installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download & Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz

      - name: Create results directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}/load

      - name: Run Load Test (150 users)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t ${{ github.workspace }}/${{ env.JMX_FILE }} \
            -l ${{ env.RESULTS_DIR }}/load.jtl \
            -e -o ${{ env.REPORTS_DIR }}/load \
            -Jthreads=150 \
            -Jrampup=120 \
            -Jloops=2
        continue-on-error: true

      - name: Check Performance Thresholds
        id: load-thresholds
        run: |
          python3 << 'EOF'
          import csv, sys, os

          jtl_file = "${{ env.RESULTS_DIR }}/load.jtl"
          error_count = 0
          total_count = 0
          total_elapsed = 0
          elapsed_values = []

          with open(jtl_file, newline='') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  total_count += 1
                  elapsed = int(row.get('elapsed', 0))
                  total_elapsed += elapsed
                  elapsed_values.append(elapsed)
                  if row.get('success', 'true').lower() != 'true':
                      error_count += 1

          if total_count == 0:
              print("ERROR: No results found in JTL file!")
              sys.exit(1)

          elapsed_values.sort()
          avg_response = total_elapsed / total_count
          error_rate = (error_count / total_count) * 100
          p90 = elapsed_values[max(int(total_count * 0.90) - 1, 0)]
          p95 = elapsed_values[max(int(total_count * 0.95) - 1, 0)]
          p99 = elapsed_values[max(int(total_count * 0.99) - 1, 0)]
          min_resp = elapsed_values[0]
          max_resp = elapsed_values[-1]

          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              print(f"avg_response={avg_response:.0f}", file=fh)
              print(f"error_rate={error_rate:.2f}", file=fh)
              print(f"total_requests={total_count}", file=fh)
              print(f"p90={p90}", file=fh)
              print(f"p95={p95}", file=fh)
              print(f"p99={p99}", file=fh)
              print(f"min_response={min_resp}", file=fh)
              print(f"max_response={max_resp}", file=fh)
              print(f"error_count={error_count}", file=fh)

          violations = []
          if avg_response > 2000:
              violations.append(f"Avg response {avg_response:.0f}ms exceeds 2000ms")
          if error_rate > 1.0:
              violations.append(f"Error rate {error_rate:.2f}% exceeds 1%")

          if violations:
              print("\n=== PERFORMANCE GATE FAILURES ===")
              for v in violations: print(v)
              sys.exit(1)
          else:
              print("\n=== ALL PERFORMANCE GATES PASSED ===")
          EOF

      - name: Upload Load Test HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-html-report
          path: ${{ env.REPORTS_DIR }}/load
          retention-days: 30

      - name: Upload Load Test JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-jtl-results
          path: ${{ env.RESULTS_DIR }}/load.jtl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 3: STRESS TEST
  # ─────────────────────────────────────────────────────────────
  stress-test:
    name: "Stress Test (300 Users)"
    runs-on: ubuntu-latest
    needs: load-test
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'stress')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache JMeter installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download & Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz

      - name: Create results directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}/stress

      - name: Run Stress Test (300 users)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t ${{ github.workspace }}/${{ env.JMX_FILE }} \
            -l ${{ env.RESULTS_DIR }}/stress.jtl \
            -e -o ${{ env.REPORTS_DIR }}/stress \
            -Jthreads=300 \
            -Jrampup=180 \
            -Jloops=1
        continue-on-error: true

      - name: Upload Stress Test HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-html-report
          path: ${{ env.REPORTS_DIR }}/stress
          retention-days: 30

      - name: Upload Stress Test JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-jtl-results
          path: ${{ env.RESULTS_DIR }}/stress.jtl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 4: ENDURANCE TEST
  # ─────────────────────────────────────────────────────────────
  endurance-test:
    name: "Endurance Test (150 Users, 30 min)"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'endurance'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache JMeter installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download & Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz

      - name: Create results directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}/endurance

      - name: Run Endurance Test (150 users, 30 min)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t ${{ github.workspace }}/${{ env.JMX_FILE }} \
            -l ${{ env.RESULTS_DIR }}/endurance.jtl \
            -e -o ${{ env.REPORTS_DIR }}/endurance \
            -Jthreads=150 \
            -Jrampup=120 \
            -Jduration=1800
        continue-on-error: true

      - name: Upload Endurance Test HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: endurance-html-report
          path: ${{ env.REPORTS_DIR }}/endurance
          retention-days: 30

      - name: Upload Endurance Test JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: endurance-jtl-results
          path: ${{ env.RESULTS_DIR }}/endurance.jtl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 5: NOTIFY
  # ─────────────────────────────────────────────────────────────
  notify:
    name: "Post Results Summary"
    runs-on: ubuntu-latest
    needs: [baseline-test, load-test, stress-test, endurance-test]
    if: always() && !cancelled()

    steps:
      - name: Build summary variables
        id: summary
        run: |
          BASELINE="${{ needs.baseline-test.result }}"
          LOAD="${{ needs.load-test.result }}"
          STRESS="${{ needs.stress-test.result }}"
          ENDURANCE="${{ needs.endurance-test.result }}"

          OVERALL="passed"
          for RESULT in "$BASELINE" "$LOAD" "$STRESS" "$ENDURANCE"; do
            if [[ "$RESULT" == "failure" || "$RESULT" == "cancelled" ]]; then
              OVERALL="failed"
              break
            fi
          done

          echo "baseline=$BASELINE"   >> $GITHUB_OUTPUT
          echo "load=$LOAD"           >> $GITHUB_OUTPUT
          echo "stress=$STRESS"       >> $GITHUB_OUTPUT
          echo "endurance=$ENDURANCE" >> $GITHUB_OUTPUT
          echo "overall=$OVERALL"     >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # ── 1. PR comment ─────────────────────────────────────────
      - name: Post PR Comment with Results Summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const baseline  = "${{ needs.baseline-test.result }}";
            const load      = "${{ needs.load-test.result }}";
            const stress    = "${{ needs.stress-test.result }}";
            const endurance = "${{ needs.endurance-test.result }}";
            const overall   = "${{ steps.summary.outputs.overall }}";
            const emoji     = overall === "passed" ? "✅" : "❌";

            const statusIcon = (r) =>
              r === "success"   ? "✅ PASSED"    :
              r === "failure"   ? "❌ FAILED"    :
              r === "cancelled" ? "⚠️ CANCELLED" : "⏭️ SKIPPED";

            const body = `## 🚀 DemoBlaze Performance Test Results — ${emoji} ${overall.toUpperCase()}

            | Test | Users | Status |
            |------|-------|--------|
            | Baseline  | 50  | ${statusIcon(baseline)}  |
            | Load      | 150 | ${statusIcon(load)}      |
            | Stress    | 300 | ${statusIcon(stress)}    |
            | Endurance | 150 | ${statusIcon(endurance)} |

            ### Thresholds Applied
            | Metric | Target |
            |--------|--------|
            | Avg Response Time | < 2000ms |
            | Error Rate | < 1% |

            📊 Download full HTML Dashboard reports from **Actions → Artifacts**.
            🔗 [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # ── 2. Build Slack payload with real metrics ───────────────
      - name: Build Slack payload
        id: slack-payload
        uses: actions/github-script@v7
        with:
          script: |
            const baseline  = "${{ needs.baseline-test.result }}";
            const load      = "${{ needs.load-test.result }}";
            const stress    = "${{ needs.stress-test.result }}";
            const endurance = "${{ needs.endurance-test.result }}";
            const overall   = "${{ steps.summary.outputs.overall }}";
            const shortSha  = "${{ steps.summary.outputs.short_sha }}";

            // Metrics from baseline threshold step (only populated when baseline ran)
            const b_avg    = "${{ needs.baseline-test.outputs.avg_response || 'N/A' }}";
            const b_err    = "${{ needs.baseline-test.outputs.error_rate || 'N/A' }}";
            const b_total  = "${{ needs.baseline-test.outputs.total_requests || 'N/A' }}";
            const b_p90    = "${{ needs.baseline-test.outputs.p90 || 'N/A' }}";
            const b_p95    = "${{ needs.baseline-test.outputs.p95 || 'N/A' }}";
            const b_p99    = "${{ needs.baseline-test.outputs.p99 || 'N/A' }}";
            const b_min    = "${{ needs.baseline-test.outputs.min_response || 'N/A' }}";
            const b_max    = "${{ needs.baseline-test.outputs.max_response || 'N/A' }}";
            const b_errors = "${{ needs.baseline-test.outputs.error_count || 'N/A' }}";

            const l_avg    = "${{ needs.load-test.outputs.avg_response || 'N/A' }}";
            const l_err    = "${{ needs.load-test.outputs.error_rate || 'N/A' }}";
            const l_total  = "${{ needs.load-test.outputs.total_requests || 'N/A' }}";
            const l_p90    = "${{ needs.load-test.outputs.p90 || 'N/A' }}";
            const l_p95    = "${{ needs.load-test.outputs.p95 || 'N/A' }}";

            const passed = overall === "passed";

            const statusText = (r) =>
              r === "success"   ? "✅  Passed"    :
              r === "failure"   ? "❌  Failed"    :
              r === "cancelled" ? "⚠️  Cancelled" : "⏭️  Skipped";

            const color       = passed ? "#2eb886" : "#e01e5a";
            const headerEmoji = passed ? "✅" : "❌";
            const headerLabel = passed
              ? "All Performance Gates Passed"
              : "Performance Gate Failure Detected";

            const triggerLabel = {
              push:              "Push",
              pull_request:      "Pull Request",
              schedule:          "Scheduled (Nightly)",
              workflow_dispatch: "Manual Trigger"
            }["${{ github.event_name }}"] || "${{ github.event_name }}";

            // Build metrics block only if baseline ran
            const metricsBlocks = baseline !== "skipped" ? [
              { type: "divider" },
              {
                type: "section",
                text: { type: "mrkdwn", text: "*📊 Baseline Metrics (50 users)*" }
              },
              {
                type: "section",
                fields: [
                  { type: "mrkdwn", text: `*Total Requests*\n${b_total}` },
                  { type: "mrkdwn", text: `*Avg Response*\n${b_avg !== 'N/A' ? b_avg + 'ms' : 'N/A'}` },
                  { type: "mrkdwn", text: `*Error Rate*\n${b_err !== 'N/A' ? b_err + '%' : 'N/A'}` },
                  { type: "mrkdwn", text: `*Errors*\n${b_errors}` },
                  { type: "mrkdwn", text: `*P90*\n${b_p90 !== 'N/A' ? b_p90 + 'ms' : 'N/A'}` },
                  { type: "mrkdwn", text: `*P95*\n${b_p95 !== 'N/A' ? b_p95 + 'ms' : 'N/A'}` },
                  { type: "mrkdwn", text: `*P99*\n${b_p99 !== 'N/A' ? b_p99 + 'ms' : 'N/A'}` },
                  { type: "mrkdwn", text: `*Min / Max*\n${b_min !== 'N/A' ? b_min + 'ms' : 'N/A'} / ${b_max !== 'N/A' ? b_max + 'ms' : 'N/A'}` },
                ]
              }
            ] : [];

            const loadMetricsBlocks = load !== "skipped" && load !== "cancelled" ? [
              { type: "divider" },
              {
                type: "section",
                text: { type: "mrkdwn", text: "*📊 Load Metrics (150 users)*" }
              },
              {
                type: "section",
                fields: [
                  { type: "mrkdwn", text: `*Total Requests*\n${l_total}` },
                  { type: "mrkdwn", text: `*Avg Response*\n${l_avg !== 'N/A' ? l_avg + 'ms' : 'N/A'}` },
                  { type: "mrkdwn", text: `*Error Rate*\n${l_err !== 'N/A' ? l_err + '%' : 'N/A'}` },
                  { type: "mrkdwn", text: `*P90*\n${l_p90 !== 'N/A' ? l_p90 + 'ms' : 'N/A'}` },
                  { type: "mrkdwn", text: `*P95*\n${l_p95 !== 'N/A' ? l_p95 + 'ms' : 'N/A'}` },
                ]
              }
            ] : [];

            const payload = {
              attachments: [
                {
                  color,
                  blocks: [
                    {
                      type: "header",
                      text: {
                        type: "plain_text",
                        text: `${headerEmoji}  DemoBlaze Performance Tests — ${headerLabel}`,
                        emoji: true
                      }
                    },
                    {
                      type: "section",
                      fields: [
                        { type: "mrkdwn", text: `*Repository*\n${{ github.repository }}` },
                        { type: "mrkdwn", text: `*Branch*\n\`${{ github.ref_name }}\`` },
                        { type: "mrkdwn", text: `*Triggered By*\n${triggerLabel}` },
                        { type: "mrkdwn", text: `*Commit*\n\`${shortSha}\`` }
                      ]
                    },
                    { type: "divider" },
                    {
                      type: "section",
                      text: { type: "mrkdwn", text: "*Test Results*" }
                    },
                    {
                      type: "section",
                      fields: [
                        { type: "mrkdwn", text: `*Baseline*  (50 users)\n${statusText(baseline)}` },
                        { type: "mrkdwn", text: `*Load*  (150 users)\n${statusText(load)}` },
                        { type: "mrkdwn", text: `*Stress*  (300 users)\n${statusText(stress)}` },
                        { type: "mrkdwn", text: `*Endurance*  (150 users / 30 min)\n${statusText(endurance)}` }
                      ]
                    },
                    ...metricsBlocks,
                    ...loadMetricsBlocks,
                    { type: "divider" },
                    {
                      type: "section",
                      text: {
                        type: "mrkdwn",
                        text: "*Performance Thresholds*\n• Avg Response Time: `< 2000ms`\n• Error Rate: `< 1%`\n• _(Checkout endpoint excluded from error rate — known 404 on demo env)_"
                      }
                    },
                    {
                      type: "actions",
                      elements: [
                        {
                          type: "button",
                          text: { type: "plain_text", text: "View Full Run & Artifacts", emoji: true },
                          url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                          style: "primary"
                        }
                      ]
                    },
                    {
                      type: "context",
                      elements: [
                        {
                          type: "mrkdwn",
                          text: `Run #${{ github.run_number }} • ${{ github.workflow }} • HTML reports available as artifacts for 30 days`
                        }
                      ]
                    }
